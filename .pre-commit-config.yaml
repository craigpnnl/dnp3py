repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        exclude: ^data/profiles/(full|demo)\.json$
        # full.json (~2.8 MB) and demo.json (~1.4 MB) are first-class 1815.2 point-map inputs, not build artifacts. The exclude stays tight to these two known-large files so any other oversized file still trips the 500 KB gate.
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned to match the ruff version installed in CI (see .github/workflows/ci.yml).
    # Keep these two in sync: updating one requires updating the other.
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        additional_dependencies: []
        args: [--strict]
        files: ^src/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
