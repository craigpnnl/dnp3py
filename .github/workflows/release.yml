name: Release

# Deliberate-dispatch only (doctrine §1).
# Merging to main does NOT cut a release.
# A default dispatch (dry_run=true) exercises build + test + smoke-test
# but creates NO tag, NO GitHub release, and NO PyPI publish.
# A real release requires an explicit dry_run=false.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true = smoke-test only, no tag/publish/release)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

# Least-privilege baseline: read-only for all jobs by default.
# Elevated permissions are granted only at the job level where needed:
#   semantic-release: contents: write (to push the tag and GitHub release)
#   publish-pypi: id-token: write (OIDC trusted-publisher flow)
permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------ #
  # Phase 1: build                                                       #
  # ------------------------------------------------------------------ #
  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          # Full history required so hatch-vcs / setuptools-scm can walk
          # the tag graph and derive the correct version string.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build hatch-vcs

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # ------------------------------------------------------------------ #
  # Phase 2: version smoke-test (doctrine §4)                           #
  # Builds a canary wheel with a synthetic sentinel version, installs   #
  # it, and asserts importlib.metadata.version("dnp3py") matches the   #
  # sentinel exactly. Any other value is a hard failure.                #
  # ------------------------------------------------------------------ #
  smoke-test:
    name: Version Smoke-Test
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build hatch-vcs

      - name: Build canary wheel with sentinel version
        env:
          # setuptools-scm / hatch-vcs pretend-version mechanism (§4).
          # Must be PEP-440 compliant because hatchling validates the version
          # string. "0.0.0.dev0+smoke.test" is clearly synthetic and
          # unambiguously not a real release version.
          SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0.dev0+smoke.test"
        run: python -m build --wheel --outdir canary-dist/

      - name: Install canary wheel and assert sentinel version
        run: |
          pip install canary-dist/*.whl
          REPORTED=$(python -c "import importlib.metadata; print(importlib.metadata.version('dnp3py'))")
          EXPECTED="0.0.0.dev0+smoke.test"
          echo "Reported version: ${REPORTED}"
          echo "Expected version: ${EXPECTED}"
          if [ "${REPORTED}" != "${EXPECTED}" ]; then
            echo "FAIL: version smoke-test mismatch. Build-flag wiring is broken."
            exit 1
          fi
          echo "PASS: version smoke-test matched sentinel."

      - name: Clean up canary artifacts
        run: |
          pip uninstall -y dnp3py || true
          rm -rf canary-dist/

  # ------------------------------------------------------------------ #
  # Phase 3: test matrix                                                 #
  # ------------------------------------------------------------------ #
  test:
    name: Test Built Package
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install package from wheel
        run: |
          pip install dist/*.whl
          pip install pytest pytest-asyncio hypothesis

      - name: Run tests against installed package
        run: pytest tests/ -v --tb=short

  # ------------------------------------------------------------------ #
  # Phase 3b: dry-run PSR version-print guard (gated on dry_run=true)  #
  # When dry_run=true the semantic-release job is skipped entirely,     #
  # which previously meant a wrong-subcommand bug (like running         #
  # `publish` instead of `version`) would never be caught in a dry run. #
  # This job exercises `semantic-release version --print`, which        #
  # computes and prints the next version without committing, tagging,   #
  # or pushing anything. It fails loudly if PSR would produce no        #
  # release (empty output), catching config/subcommand bugs before      #
  # a real release attempt.                                             #
  # ------------------------------------------------------------------ #
  dry-run-version-check:
    name: Dry-run version-print guard
    needs: [smoke-test, test]
    runs-on: ubuntu-latest
    if: inputs.dry_run == 'true'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install python-semantic-release
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release

      - name: Assert PSR would produce a release (version --print)
        # `semantic-release version --print` computes the next semver version
        # from conventional commits and prints it, with no side effects
        # (no commit, no tag, no push, no GitHub release). If PSR determines
        # there are no releasable commits since the last tag, it prints
        # nothing (empty output). We assert that output is non-empty: if it
        # is empty, the pipeline fails here rather than silently producing a
        # no-op when dry_run is later set to false.
        run: |
          NEXT_VERSION=$(semantic-release version --print)
          echo "PSR computed next version: '${NEXT_VERSION}'"
          if [ -z "${NEXT_VERSION}" ]; then
            echo "FAIL: semantic-release version --print produced no output."
            echo "  Either there are no releasable conventional commits since the last tag,"
            echo "  or the PSR configuration is broken (wrong branch, wrong parser, etc.)."
            echo "  Fix the configuration or add a releasable commit before dispatching a real release."
            exit 1
          fi
          echo "PASS: PSR would produce version ${NEXT_VERSION} on a real release dispatch."

  # ------------------------------------------------------------------ #
  # Phase 4: PSR tag + CHANGELOG + GitHub release (gated on dry_run=false) #
  # PSR does NOT publish to PyPI (upload_to_pypi = false in pyproject.toml).
  # The dedicated publish-pypi OIDC job is the sole PyPI publish path.   #
  # The new release tag is exposed as a job output so publish-pypi can   #
  # check out exactly that tag and build a clean PEP 440 wheel.          #
  # ------------------------------------------------------------------ #
  semantic-release:
    name: Semantic Release (tag + CHANGELOG + GitHub release)
    needs: [smoke-test, test]
    runs-on: ubuntu-latest
    if: inputs.dry_run != 'true'
    permissions:
      # contents: write is required so PSR can push the tag and create the
      # GitHub release. Scoped here rather than at the workflow level so
      # build/smoke-test/test jobs retain read-only access.
      contents: write
    # Expose the new tag to downstream jobs so publish-pypi can check it out.
    outputs:
      release_tag: ${{ steps.post-release.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install python-semantic-release
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      # Post-release assert baseline (doctrine §5): record the current latest
      # tag BEFORE PSR runs so the post-assert can compare pre vs. post and
      # detect a no-op (PSR exits zero without creating a new tag).
      - name: Capture pre-release tag baseline
        id: pre-release
        run: |
          git fetch --tags origin
          PRE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Pre-release latest tag: ${PRE_TAG}"
          echo "pre_tag=${PRE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Run python-semantic-release
        # In PSR v10, `version` is the command that computes the semver bump
        # from conventional commits, writes CHANGELOG.md, commits (when
        # commit_version_number=true), creates and pushes the tag, and creates
        # the GitHub VCS release. `publish` in v10 is a separate command that
        # only uploads pre-built dists to an existing release; it does NOT
        # create a tag or a GitHub release. Running `publish` instead of
        # `version` is what caused the v0.1.1 attempt to exit zero without
        # cutting anything. The dedicated publish-pypi OIDC job handles PyPI;
        # PSR's own upload_to_pypi is false, so `version` here only tags and
        # creates the GitHub release (upload_to_release = true in pyproject.toml).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release version

      - name: Post-release tag assert
        id: post-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags origin
          POST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          PRE_TAG="${{ steps.pre-release.outputs.pre_tag }}"
          echo "Pre-release tag:  ${PRE_TAG}"
          echo "Post-release tag: ${POST_TAG}"
          if [ -z "${POST_TAG}" ] || [ "${POST_TAG}" = "${PRE_TAG}" ]; then
            echo "FAIL: no new tag was created by semantic-release."
            echo "  Expected a new vX.Y.Z tag beyond '${PRE_TAG}' on origin."
            echo "  PSR exited zero without cutting a release (no releasable commits since last tag,"
            echo "  or the wrong subcommand was used)."
            exit 1
          fi
          REMOTE_CHECK=$(git ls-remote --tags origin "refs/tags/${POST_TAG}")
          if [ -z "${REMOTE_CHECK}" ]; then
            echo "FAIL: new tag ${POST_TAG} was created locally but not found on origin."
            exit 1
          fi
          echo "Post-release assert PASS: new tag ${POST_TAG} confirmed on origin (was: ${PRE_TAG})."
          echo "release_outcome=released" >> "$GITHUB_OUTPUT"
          echo "release_tag=${POST_TAG}" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------ #
  # Phase 5: PyPI publish (gated on dry_run=false)                      #
  # Sole PyPI publish path. PSR is configured with upload_to_pypi=false  #
  # so it never attempts a parallel publish. OIDC trusted publisher only. #
  #                                                                      #
  # ROOT-CAUSE FIX: the broken v0.1.1 flow downloaded the pre-tag       #
  # artifact built by the `build` job (which ran before the tag existed) #
  # and handed it to PyPI. hatch-vcs stamped it with a dev+local version #
  # (e.g. 0.1.1.dev35+g70aac4fd3) which PyPI rejects with HTTP 400.    #
  # Fix: check out the newly created tag, rebuild from that commit so    #
  # hatch-vcs sees the exact tag and stamps a clean PEP 440 version      #
  # (e.g. 0.1.2), then assert the version is clean before uploading.    #
  # ------------------------------------------------------------------ #
  publish-pypi:
    name: Publish to PyPI
    needs: semantic-release
    runs-on: ubuntu-latest
    if: inputs.dry_run != 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/dnp3py
    permissions:
      # id-token: write is required for OIDC trusted-publisher authentication.
      # Scoped here so no other job in this workflow can request an OIDC token.
      id-token: write

    steps:
      # Check out the exact tag that semantic-release just created.
      # fetch-depth: 0 is required so hatch-vcs / setuptools-scm can walk
      # the full tag graph and stamp the clean release version (e.g. 0.1.2).
      # Without this, git describe cannot find the tag and produces a dev+local
      # version string that PyPI rejects.
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.semantic-release.outputs.release_tag }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build hatch-vcs

      - name: Build wheel from release tag
        run: python -m build

      # Fail-closed guard: assert the built wheel carries a clean PEP 440
      # release version before attempting any upload. A dev or local version
      # (containing ".dev" or "+") is an immediate hard failure. This prevents
      # a bad artifact from ever reaching PyPI, even if the tag-checkout
      # ordering regresses in a future workflow edit.
      - name: Assert wheel version is a clean PEP 440 release
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          # Extract the version from the wheel filename: name-VERSION-*.whl
          WHEEL_VERSION=$(echo "${WHEEL}" | sed 's/.*-\([0-9][^-]*\)-.*/\1/')
          echo "Wheel file:    ${WHEEL}"
          echo "Wheel version: ${WHEEL_VERSION}"
          if echo "${WHEEL_VERSION}" | grep -q '[+]'; then
            echo "FAIL: wheel version '${WHEEL_VERSION}' contains a local segment (+)."
            echo "  This means the build did not check out the release tag correctly."
            echo "  A local version is not allowed on PyPI (PEP 440)."
            exit 1
          fi
          if echo "${WHEEL_VERSION}" | grep -q '\.dev'; then
            echo "FAIL: wheel version '${WHEEL_VERSION}' contains a dev segment (.dev)."
            echo "  This means hatch-vcs could not find the release tag during build."
            echo "  Ensure fetch-depth: 0 and the correct ref are set on the checkout step."
            exit 1
          fi
          echo "PASS: wheel version '${WHEEL_VERSION}' is a clean PEP 440 release version."

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0

  # ------------------------------------------------------------------ #
  # Phase 6: structured outcome notification (doctrine §6)              #
  # One success event at end of clean run; one failure event from the   #
  # first failing phase (via GitHub Actions job-summary, redacted).     #
  # A richer transport (Telegram/Discord) is a follow-up; not wired.   #
  # ------------------------------------------------------------------ #
  release-outcome:
    name: Release Outcome
    needs: [build, smoke-test, test, dry-run-version-check, semantic-release, publish-pypi]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Write release outcome to job summary
        run: |
          BUILD="${{ needs.build.result }}"
          SMOKE="${{ needs.smoke-test.result }}"
          TEST="${{ needs.test.result }}"
          DRY_CHECK="${{ needs.dry-run-version-check.result }}"
          PSR="${{ needs.semantic-release.result }}"
          PYPI="${{ needs.publish-pypi.result }}"
          DRY_RUN="${{ inputs.dry_run }}"

          echo "## Release Outcome" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Phase | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| build | ${BUILD} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| smoke-test | ${SMOKE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| test | ${TEST} |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${DRY_RUN}" = "true" ]; then
            echo "| dry-run-version-check | ${DRY_CHECK} |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| semantic-release | ${PSR} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| publish-pypi | ${PYPI} |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Determine overall outcome. Stop on first failure.
          FAILED_PHASE=""
          for PHASE_RESULT in "${BUILD}:build" "${SMOKE}:smoke-test" "${TEST}:test"; do
            RESULT="${PHASE_RESULT%%:*}"
            PHASE="${PHASE_RESULT##*:}"
            if [ "${RESULT}" = "failure" ]; then
              FAILED_PHASE="${PHASE}"
              break
            fi
          done

          if [ "${DRY_RUN}" = "true" ]; then
            if [ "${DRY_CHECK}" = "failure" ] && [ -z "${FAILED_PHASE}" ]; then
              FAILED_PHASE="dry-run-version-check"
            fi
          else
            for PHASE_RESULT in "${PSR}:semantic-release" "${PYPI}:publish-pypi"; do
              RESULT="${PHASE_RESULT%%:*}"
              PHASE="${PHASE_RESULT##*:}"
              if [ "${RESULT}" = "failure" ] && [ -z "${FAILED_PHASE}" ]; then
                FAILED_PHASE="${PHASE}"
                break
              fi
            done
          fi

          if [ -n "${FAILED_PHASE}" ]; then
            echo "**Outcome: FAILED** at phase \`${FAILED_PHASE}\`." >> "$GITHUB_STEP_SUMMARY"
            echo "See the failing job log above for the full (unredacted) output." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            if [ "${DRY_RUN}" = "true" ]; then
              echo "**Outcome: SUCCESS (dry run)** Build, smoke-test, test matrix, and PSR version-print check all passed. No tag or publish performed." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "**Outcome: SUCCESS** Tag created, GitHub release published, PyPI artifact pushed." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
